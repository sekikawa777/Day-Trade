<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キオクシア & 日経平均 モニター</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const MOCK_DATA = {
      '1D': {
        chart: [
          { time: '09:00', kioxia: 6700, nikkei: 39500 },
          { time: '10:00', kioxia: 6460, nikkei: 39620 },
          { time: '11:30', kioxia: 6480, nikkei: 39580 },
          { time: '13:00', kioxia: 6500, nikkei: 39710 },
          { time: '14:00', kioxia: 6480, nikkei: 39650 },
          { time: '15:00', kioxia: 6180, nikkei: 39600 },
        ],
        comment: '本日は寄り付き後に売りが出やすく下落傾向。海外メモリー株の動きや直近のニュースを背景にボラティリティが高まっています。'
      },
      '1W': {
        chart: [
          { time: '7/18', kioxia: 5400, nikkei: 39100 },
          { time: '7/21', kioxia: 6300, nikkei: 39400 },
          { time: '7/22', kioxia: 6420, nikkei: 39700 },
          { time: '7/23', kioxia: 6180, nikkei: 39600 },
          { time: '7/24', kioxia: 6250, nikkei: 39650 },
        ],
        comment: '急落からの急速な反発が交錯する荒い値動き。短期的な調整を踏まえつつも底値を試す展開となっています。'
      },
      '1M': {
        chart: [
          { time: '6/23', kioxia: 7500, nikkei: 38200 },
          { time: '6/30', kioxia: 7200, nikkei: 38500 },
          { time: '7/07', kioxia: 6800, nikkei: 39000 },
          { time: '7/14', kioxia: 6200, nikkei: 39200 },
          { time: '7/24', kioxia: 6250, nikkei: 39650 },
        ],
        comment: '利確売りなどにより一時調整局面。半導体市況全体の回復期待が今後の下支え要因となっています。'
      },
      '3M': {
        chart: [
          { time: '4/24', kioxia: 4500, nikkei: 37500 },
          { time: '5/20', kioxia: 5800, nikkei: 38800 },
          { time: '6/22', kioxia: 7800, nikkei: 39100 },
          { time: '7/10', kioxia: 6800, nikkei: 39300 },
          { time: '7/24', kioxia: 6250, nikkei: 39650 },
        ],
        comment: 'NAND需給の引き締めやAI需要期待から高値を追う場面もありましたが、直近はもみ合いとなっています。'
      },
      '6M': {
        chart: [
          { time: '1/24', kioxia: 3200, nikkei: 36000 },
          { time: '3/01', kioxia: 4200, nikkei: 37500 },
          { time: '4/15', kioxia: 4800, nikkei: 38000 },
          { time: '6/01', kioxia: 7200, nikkei: 38900 },
          { time: '7/24', kioxia: 6250, nikkei: 39650 },
        ],
        comment: '安値圏からの大きな上昇トレンドを描いた半年間。中長期的にはAIデータセンター向け需要が鍵となります。'
      },
      '1Y': {
        chart: [
          { time: '25/07', kioxia: 2800, nikkei: 37000 },
          { time: '25/11', kioxia: 2500, nikkei: 38000 },
          { time: '26/01', kioxia: 3200, nikkei: 36500 },
          { time: '26/05', kioxia: 6000, nikkei: 38800 },
          { time: '26/07', kioxia: 6250, nikkei: 39650 },
        ],
        comment: '業界全体の減産効果とAI向けメモリ需要の急増により、大幅な業績改善プロセスが進行中です。'
      },
      '3Y': {
        chart: [
          { time: '24/12', kioxia: 1440, nikkei: 33000 },
          { time: '25/06', kioxia: 2200, nikkei: 36000 },
          { time: '25/12', kioxia: 2800, nikkei: 37500 },
          { time: '26/04', kioxia: 5200, nikkei: 38500 },
          { time: '26/07', kioxia: 6250, nikkei: 39650 },
        ],
        comment: '半導体サイクルの波をダイレクトに反映しながら推移。次世代記憶技術のシェア拡大が焦点です。'
      }
    };

    const PERIODS = [
      { label: '1日', value: '1D' },
      { label: '1週間', value: '1W' },
      { label: '1ヶ月', value: '1M' },
      { label: '3ヶ月', value: '3M' },
      { label: '6ヶ月', value: '6M' },
      { label: '1年', value: '1Y' },
      { label: '3年', value: '3Y' },
    ];

    function SimpleChart({ data }) {
      if (!data || data.length === 0) return null;
      
      const width = 600;
      const height = 200;
      const padding = 30;

      const kioxiaVals = data.map(d => d.kioxia);
      const minK = Math.min(...kioxiaVals);
      const maxK = Math.max(...kioxiaVals);
      
      const kioxiaPoints = data.map((d, i) => {
        const x = padding + (i / (data.length - 1)) * (width - padding * 2);
        const y = height - padding - ((d.kioxia - minK) / (maxK - minK || 1)) * (height - padding * 2);
        return `${x},${y}`;
      }).join(' ');

      return (
        <div className="w-full overflow-x-auto">
          <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
            <line x1={padding} y1={padding} x2={width - padding} y2={padding} stroke="#e5e7eb" strokeDasharray="4" />
            <line x1={padding} y1={height / 2} x2={width - padding} y2={height / 2} stroke="#e5e7eb" strokeDasharray="4" />
            <line x1={padding} y1={height - padding} x2={width - padding} y2={height - padding} stroke="#e5e7eb" strokeDasharray="4" />
            
            <polyline fill="none" stroke="#2563eb" strokeWidth="3" points={kioxiaPoints} />
            
            {data.map((d, i) => {
              const x = padding + (i / (data.length - 1)) * (width - padding * 2);
              const y = height - padding - ((d.kioxia - minK) / (maxK - minK || 1)) * (height - padding * 2);
              return (
                <g key={i}>
                  <circle cx={x} cy={y} r="4" fill="#2563eb" />
                  <text x={x} y={height - 10} fontSize="10" textAnchor="middle" fill="#6b7280">{d.time}</text>
                </g>
              );
            })}
          </svg>
        </div>
      );
    }

    function StockDashboard() {
      const [selectedPeriod, setSelectedPeriod] = useState('1D');
      const [data, setData] = useState(MOCK_DATA['1D']);
      const [lastUpdated, setLastUpdated] = useState(new Date().toLocaleTimeString());

      // 保有状況の状態管理（初期値はローカルストレージから取得）
      const [buyPrice, setBuyPrice] = useState(() => {
        return localStorage.getItem('kioxia_buyPrice') || '5000';
      });
      const [shares, setShares] = useState(() => {
        return localStorage.getItem('kioxia_shares') || '100';
      });

      useEffect(() => {
        setData(MOCK_DATA[selectedPeriod]);
      }, [selectedPeriod]);

      // 入力値をローカルストレージに自動保存
      const handleBuyPriceChange = (e) => {
        const val = e.target.value;
        setBuyPrice(val);
        localStorage.setItem('kioxia_buyPrice', val);
      };

      const handleSharesChange = (e) => {
        const val = e.target.value;
        setShares(val);
        localStorage.setItem('kioxia_shares', val);
      };

      const handleRefresh = () => {
        setLastUpdated(new Date().toLocaleTimeString());
      };

      const calcChange = (key) => {
        const list = data.chart;
        if (!list || list.length < 2) return { amount: 0, percent: '0.00' };
        const start = list[0][key];
        const end = list[list.length - 1][key];
        const amount = end - start;
        const percent = ((amount / start) * 100).toFixed(2);
        return { amount, percent };
      };

      const kioxiaChange = calcChange('kioxia');
      const nikkeiChange = calcChange('nikkei');

      const currentKioxia = data.chart[data.chart.length - 1].kioxia;
      const currentNikkei = data.chart[data.chart.length - 1].nikkei;

      // 資産計算ロジック
      const numShares = parseFloat(shares) || 0;
      const numBuyPrice = parseFloat(buyPrice) || 0;
      
      const totalInvestment = numShares * numBuyPrice; // 投資金額（取得コスト）
      const currentEvaluation = numShares * currentKioxia; // 現在の評価額
      const totalProfit = currentEvaluation - totalInvestment; // 損益金額（儲け）
      const profitPercent = totalInvestment > 0 ? ((totalProfit / totalInvestment) * 100).toFixed(2) : '0.00';

      return (
        <div className="max-w-4xl mx-auto p-4 font-sans min-h-screen">
          {/* ヘッダー */}
          <header className="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <div>
              <h1 className="text-xl font-bold text-gray-800">キオクシア (285A) & 日経平均 モニター</h1>
              <p className="text-xs text-gray-500">最終更新: {lastUpdated}</p>
            </div>
            <button
              onClick={handleRefresh}
              className="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 transition flex items-center gap-1 text-sm cursor-pointer"
            >
              🔄 更新
            </button>
          </header>

          {/* 期間選択タブ */}
          <div className="flex gap-2 mb-6 overflow-x-auto pb-2">
            {PERIODS.map((period) => (
              <button
                key={period.value}
                onClick={() => setSelectedPeriod(period.value)}
                className={`px-4 py-2 rounded-lg text-sm font-medium transition cursor-pointer ${
                  selectedPeriod === period.value
                    ? 'bg-blue-600 text-white shadow-md'
                    : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'
                }`}
              >
                {period.label}
              </button>
            ))}
          </div>

          {/* 株価サマリーカード */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
              <span className="text-xs font-bold text-blue-600 uppercase tracking-wider">個別銘柄 (285A)</span>
              <h2 className="text-lg font-bold text-gray-700">キオクシアHD</h2>
              <div className="flex items-baseline gap-3 mt-2">
                <span className="text-2xl font-black text-gray-900">
                  ¥{currentKioxia.toLocaleString()}
                </span>
                <span className={`text-sm font-bold ${kioxiaChange.amount >= 0 ? 'text-red-500' : 'text-green-600'}`}>
                  {kioxiaChange.amount >= 0 ? `▲ +${kioxiaChange.amount}` : `▼ ${kioxiaChange.amount}`} ({kioxiaChange.percent}%)
                </span>
              </div>
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
              <span className="text-xs font-bold text-emerald-600 uppercase tracking-wider">市場インデックス</span>
              <h2 className="text-lg font-bold text-gray-700">日経平均株価</h2>
              <div className="flex items-baseline gap-3 mt-2">
                <span className="text-2xl font-black text-gray-900">
                  ¥{currentNikkei.toLocaleString()}
                </span>
                <span className={`text-sm font-bold ${nikkeiChange.amount >= 0 ? 'text-red-500' : 'text-green-600'}`}>
                  {nikkeiChange.amount >= 0 ? `▲ +${nikkeiChange.amount}` : `▼ ${nikkeiChange.amount}`} ({nikkeiChange.percent}%)
                </span>
              </div>
            </div>
          </div>

          {/* 【新機能】保有資産・損益管理パネル */}
          <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 mb-6">
            <h3 className="text-md font-bold text-gray-800 mb-4 flex items-center gap-2">
              💰 キオクシア保有・損益シミュレーション
            </h3>
            
            {/* 入力フォーム */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 bg-gray-50 p-4 rounded-lg">
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1">平均購入単価 (円)</label>
                <input
                  type="number"
                  value={buyPrice}
                  onChange={handleBuyPriceChange}
                  placeholder="例: 5000"
                  className="w-full p-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-500"
                />
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1">保有株数 (株)</label>
                <input
                  type="number"
                  value={shares}
                  onChange={handleSharesChange}
                  placeholder="例: 100"
                  className="w-full p-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-500"
                />
              </div>
            </div>

            {/* 損益結果の表示 */}
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <div className="p-3 bg-gray-50 rounded-lg border border-gray-200">
                <span className="text-xs text-gray-500 block">総投資金額</span>
                <span className="text-base font-bold text-gray-800">
                  ¥{totalInvestment.toLocaleString()}
                </span>
              </div>
              <div className="p-3 bg-gray-50 rounded-lg border border-gray-200">
                <span className="text-xs text-gray-500 block">現在の評価額</span>
                <span className="text-base font-bold text-gray-800">
                  ¥{currentEvaluation.toLocaleString()}
                </span>
              </div>
              <div className={`p-3 rounded-lg border ${totalProfit >= 0 ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'}`}>
                <span className="text-xs text-gray-500 block">評価損益（儲け額）</span>
                <span className={`text-base font-bold ${totalProfit >= 0 ? 'text-red-600' : 'text-green-600'}`}>
                  {totalProfit >= 0 ? `+¥${totalProfit.toLocaleString()}` : `-¥${Math.abs(totalProfit).toLocaleString()}`}
                  <span className="text-xs ml-1">({profitPercent}%)</span>
                </span>
              </div>
            </div>
          </div>

          {/* 株価チャートエリア */}
          <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 mb-6">
            <h3 className="text-md font-bold text-gray-800 mb-2">キオクシア 株価推移（{selectedPeriod}）</h3>
            <SimpleChart data={data.chart} />
          </div>

          {/* コメントエリア */}
          <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-5 rounded-xl border border-blue-100">
            <h3 className="text-sm font-bold text-blue-900 mb-2 flex items-center gap-2">
              💡 {selectedPeriod} 期間の動きと今後の見通し
            </h3>
            <p className="text-sm text-blue-950 leading-relaxed">
              {data.comment}
            </p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<StockDashboard />);
  </script>
</body>
</html>
